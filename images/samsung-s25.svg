<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 220 440" width="220" height="440">
  <defs>
    <linearGradient id="bg_samsung_s25" x1="0" y1="0" x2="220" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#293949"/>
      <stop offset="100%" stop-color="#1a2a3a"/>
    </linearGradient>
    <linearGradient id="screen_samsung_s25" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0a12"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
    <radialGradient id="glow_samsung_s25" cx="50%" cy="35%" r="50%">
      <stop offset="0%" stop-color="#70a8c0" stop-opacity=".25"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <filter id="shadow_samsung_s25">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-opacity=".18"/>
    </filter>
  </defs>
  <!-- Phone body -->
  <rect width="220" height="440" rx="38" fill="url(#bg_samsung_s25)" filter="url(#shadow_samsung_s25)"/>
  <!-- Screen -->
  <rect x="10" y="10" width="200" height="420" rx="30" fill="url(#screen_samsung_s25)"/>
  <rect x="10" y="10" width="200" height="420" rx="30" fill="url(#glow_samsung_s25)"/>
  <!-- Dynamic Island / Notch -->
  <rect x="75" y="18" width="70" height="18" rx="9" fill="#0a0a0a" stroke="rgba(255,255,255,.06)" stroke-width=".5"/>
  <circle cx="100" cy="27" r="4" fill="#1a1a2a" stroke="rgba(255,255,255,.08)" stroke-width=".5"/>
  <circle cx="120" cy="27" r="2.5" fill="#1a1a2a"/>
  <!-- Camera module -->
  <rect x="14" y="14" width="68" height="68" rx="18" fill="rgba(0,0,0,.4)" stroke="rgba(255,255,255,.08)" stroke-width=".5"/>
  <circle cx="35" cy="38" r="12" fill="#0d0d15" stroke="rgba(255,255,255,.12)" stroke-width="1"/>
  <circle cx="35" cy="38" r="8" fill="#1a1a28" stroke="#70a8c0" stroke-width=".5" stroke-opacity=".3"/>
  <circle cx="35" cy="38" r="3" fill="#70a8c0" opacity=".15"/>
  <circle cx="60" cy="35" r="8" fill="#0d0d15" stroke="rgba(255,255,255,.1)" stroke-width=".8"/>
  <circle cx="60" cy="35" r="5" fill="#1a1a28"/>
  <circle cx="48" cy="58" r="5" fill="#0d0d15" stroke="rgba(255,255,255,.08)" stroke-width=".5"/>
  <circle cx="66" cy="55" r="2" fill="#1a1a1a"/>
  <!-- Screen content: Brand -->
  <text x="110" y="175" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="13" font-weight="300" letter-spacing="3" fill="rgba(255,255,255,.2)" text-transform="uppercase">SAMSUNG</text>
  <!-- Screen content: Model name -->
  <text x="110" y="220" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="22" font-weight="700" fill="rgba(255,255,255,.6)">Galaxy</text>
  <text x="110" y="248" text-anchor="middle" font-family="system-ui,-apple-system,Segoe UI,sans-serif" font-size="18" font-weight="400" fill="rgba(255,255,255,.35)">S25</text>
  <!-- Screen accent line -->
  <rect x="70" y="290" width="80" height="2" rx="1" fill="#70a8c0" opacity=".25"/>
  <!-- Bottom bar -->
  <rect x="78" y="418" width="64" height="3.5" rx="2" fill="rgba(255,255,255,.12)"/>
  <!-- Side buttons -->
  <rect x="218" y="115" width="3" height="55" rx="1.5" fill="rgba(255,255,255,.06)"/>
  <rect x="-1" y="100" width="3" height="35" rx="1.5" fill="rgba(255,255,255,.06)"/>
  <rect x="-1" y="145" width="3" height="35" rx="1.5" fill="rgba(255,255,255,.06)"/>
  <!-- Subtle reflection -->
  <rect x="10" y="10" width="200" height="210" rx="30" fill="url(#glow_samsung_s25)" opacity=".3"/>
</svg>