  <!-- Bottom -->
  <circle cx="110" cy="416" r="3" fill="rgba(255,255,255,.06)"/>
  <rect x="97" y="424" width="26" height="2" rx="1" fill="rgba(255,255,255,.08)"/>
  <!-- Brand -->
